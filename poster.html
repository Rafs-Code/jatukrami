<!DOCTYPE html>
<html lang="su">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poster Digital Interaktif — Jatukrami</title>
  
  <!-- ============ GOOGLE FONTS ============ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Noto+Sans+Sundanese:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Fancy Page Transition */
    @keyframes pageEnter {
      from { opacity: 0; transform: scale(1.05); filter: blur(10px); }
      to { opacity: 1; transform: scale(1); filter: blur(0); }
    }

    @keyframes posterEnter {
      from { opacity: 0; transform: translateY(30px) rotateX(10deg); }
      to { opacity: 1; transform: translateY(0) rotateX(0); }
    }

    body {
      background: var(--color-bg-page);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      margin: 0;
      overflow-x: hidden;
      animation: pageEnter 0.5s var(--transition-base) forwards;
      perspective: 1000px;
    }
    
    .poster-wrapper {
      width: 100%;
      max-width: 400px;
      margin: var(--space-8) 0;
      position: relative;
      animation: posterEnter 0.5s var(--transition-base) both;
    }

    .poster-container {
      width: 100%;
      aspect-ratio: 9/16;
      background: white;
      box-shadow: var(--shadow-xl);
      border-radius: var(--radius-lg);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.5s var(--transition-base);
    }

    .poster-container:hover {
      transform: translateY(-5px) rotateY(2deg);
    }

    .poster-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Styled Back Button */
    .back-btn {
      position: fixed;
      top: var(--space-4);
      left: var(--space-4);
      padding: 12px 24px;
      background: var(--color-text-primary);
      color: var(--color-text-inverse);
      text-decoration: none;
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: var(--fs-xs);
      font-weight: var(--fw-bold);
      z-index: 100;
      transition: all var(--transition-base);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-md);
      border: 1px solid transparent;
    }

    .back-btn:hover {
      background: var(--color-accent);
      border-color: var(--color-primary-300);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .back-btn:active {
      background: var(--color-primary-900);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .download-controls {
      margin-top: var(--space-4);
      width: 100%;
      max-width: 400px;
      display: flex;
      justify-content: center;
      z-index: 10;
      animation: posterEnter 0.5s var(--transition-base) both;
    }


    .control-btn {
      width: 100%;
      padding: 18px;
      background: var(--color-accent);
      color: white;
      border: none;
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      font-weight: var(--fw-bold);
      cursor: pointer;
      transition: all var(--transition-base);
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      letter-spacing: 1px;
    }

    .control-btn:hover {
      background: var(--color-primary-700);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .control-btn:active {
      background: var(--color-text-primary);
      transform: translateY(-1px) scale(0.98);
      box-shadow: var(--shadow-sm);
    }

    /* Out Transition Overlay */
    .transition-overlay {
      position: fixed;
      inset: 0;
      background: var(--color-bg-page);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .transition-active .transition-overlay {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 380px) {
      .poster-wrapper { max-width: 100%; }
      .back-btn { padding: 10px 18px; }
    }
  </style>
</head>
<body>
  <div class="transition-overlay"></div>

  <a href="index.html" class="back-btn" id="backBtn">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    <span>Balik ka Undangan</span>
  </a>

  <div class="poster-wrapper" id="posterArea">
    <div class="poster-container">
      <img src="assets/images/Gold Illustrated Wedding Poster.png" alt="Poster Pernikahan Jatukrami" class="poster-image">
    </div>
  </div>

  <div class="download-controls">
    <button class="control-btn" onclick="downloadPoster()">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      <span>UNDUH POSTER (JPG)</span>
    </button>
  </div>

  <script>
    // Smooth Transition Out
    document.getElementById('backBtn').addEventListener('click', function(e) {
      e.preventDefault();
      const target = this.getAttribute('href');
      document.body.classList.add('transition-active');
      setTimeout(() => {
        window.location.href = target;
      }, 500);
    });

    function downloadPoster() {
      const link = document.createElement('a');
      link.href = 'assets/images/Gold Illustrated Wedding Poster.png';
      link.download = 'Poster_Pernikahan_Jatukrami.png';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
